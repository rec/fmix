[audio]
# begin = 1.5  # Set these to only render a portion of the result
# end = 1.5
gain = 1.0
normalize = true

[files]
inputs = ['1-2 + 160800.wav', '3-4 + 160800.wav']
output_root = 'MIX'
# out.file_root is prepended to the longest common suffix in the filenames
# In this case, the output file will be `mix + 160800.wav`.

# file_name = 'mix-160800.wav'
# Or you can explicitly set the file_name.

[fade]
curve = 'linear'   # From ffmpeg
duration = 1.0     # In seconds

[[edit_point]]
time = 60
mix = {9 = 1}      # Any track starting with 9 is at level 1, all else at level 0

[[edit_point]]
time = '2:03.45'   # Just after two minutes. The number 123.45 also works.
mix = {3 = 0.7, 5 = 0.8, 7 = 0.7}

[[edit_point]]
time = 185.0       # The string '3:05' also works
mix = {9 = 1}

[[edit_point]]
time = '20:57.02'
mix = {}
