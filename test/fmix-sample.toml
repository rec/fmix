[audio]
# start = 1.5  # Set these to only render a portion of the result
# end = 1.5
gain = 1.0
normalize = true

[files]
inputs = {ben = '3-4 + 160.wav', wx = '5-6 + 160.wav', dl = '7-8 + 160.wav', mix = '9-10 + 160.wav'}
output = 'MIX + 150.wav'

[fade]
curve = 'linear'   # From ffmpeg
duration = 1.0     # In seconds

[[edit_point]]
time = 60
mix = {mix = 1}      # Any track starting with 9 is at level 1, all else at level 0

[[edit_point]]
time = '2:03.45'   # Just after two minutes. The number 123.45 also works.
mix = {ben = 0.7, wx = 0.8, dl = 0.7}

[[edit_point]]
time = 185.0       # The string '3:05' also works
mix = {ben = 1}

[[edit_point]]
time = '20:57.02'
mix = {}
